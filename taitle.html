.blob{

}

.b4{

@keyframes morph{

0%{
transform:
translate(0,0)
rotate(0deg)
scale(.9);

border-radius:
42% 58% 63% 37% /
40% 45% 55% 60%;
}

25%{
transform:
translate(30px,-20px)
rotate(45deg)
scale(1.1);

border-radius:
60% 40% 55% 45% /
55% 35% 65% 45%;
}

50%{

35% 65% 40% 60% /

75%{

70% 30% 55% 45% /

100%{

translate(-15px,-30px)
rotate(360deg)

border-radius:
45% 55% 35% 65% /
65% 40% 60% 35%;
