<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:#fff;
    font-family:"MS UI Gothic",monospace;
    overflow:hidden;
}

/* 胎动背景 */

.blob{
    position:absolute;
    border:1px solid rgba(255,255,255,.12);
    filter:blur(1px);
    animation:morph linear infinite alternate;
}

.b1{
    width:420px;
    height:420px;
    left:5%;
    top:8%;
    animation-duration:32s;
}

.b2{
    width:260px;
    height:260px;
    right:8%;
    top:18%;
    animation-duration:28s;
}

.b3{
    width:320px;
    height:320px;
    left:48%;
    bottom:-80px;
    animation-duration:40s;
}

@keyframes morph{

0%{
transform:translate(0,0) rotate(0deg) scale(.9);
border-radius:42% 58% 63% 37% / 40% 45% 55% 60%;
}

50%{
transform:translate(30px,-20px) rotate(160deg) scale(1.08);
border-radius:65% 35% 40% 60% / 55% 35% 65% 45%;
}

100%{
transform:translate(-20px,25px) rotate(360deg) scale(.92);
border-radius:35% 65% 55% 45% / 65% 40% 60% 35%;
}

}

/* 扫描线 */

body::after{

content:"";
position:fixed;
left:0;
top:0;
right:0;
bottom:0;

background:
repeating-linear-gradient(
transparent,
transparent 3px,
rgba(255,255,255,.02) 4px
);

pointer-events:none;

}

/* 中央窗口 */

main{

position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);

width:760px;
max-width:90%;

padding:36px;

border:1px solid rgba(255,255,255,.35);

background:rgba(0,0,0,.72);

backdrop-filter:blur(4px);

z-index:10;

}

/* 横幅 */

.banner{

display:block;

width:100%;

max-height:180px;

object-fit:contain;

margin-bottom:28px;

animation:bannerFloat 10s ease-in-out infinite;

}

/* 标题 */

.titlebox{

display:flex;

align-items:center;

gap:18px;

margin-bottom:10px;

}

.logo{

width:72px;

height:72px;

object-fit:contain;

animation:logoFloat 6s ease-in-out infinite;

}

h1{

font-size:40px;
font-weight:normal;

}

.cursor{

animation:blink .9s steps(1) infinite;

}

@keyframes blink{

50%{
opacity:0;
}

}

@keyframes bannerFloat{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-5px);
}

}

@keyframes logoFloat{

0%,100%{
transform:translateY(0) rotate(-2deg);
}

50%{
transform:translateY(-6px) rotate(2deg);
}

}

hr{

border:none;
border-top:1px solid #555;
margin:18px 0;

}

h2{

font-size:16px;
font-weight:normal;
margin-bottom:8px;

}

p{

line-height:1.8;
color:#ddd;

}

</style>
